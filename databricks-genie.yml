bundle:
  name: xome_lakebase_campaign_genie

resources:
  apps:
    xome_lakebase_campaign_genie:
      name: "xome-lakebase-campaign-genie"
      description: "Xome Genie Campaign Platform — Genie Spaces powered user discovery + LangGraph personalized email campaigns"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-server"]

      resources:
        - name: "sql_warehouse"
          sql_warehouse:
            id: "1f01d0f9de5b5108"
            permission: "CAN_USE"
        - name: "lakebase_db"
          database:
            instance_name: "xome-campaign"
            database_name: "xome-campaign"
            permission: "CAN_CONNECT_AND_CREATE"
        - name: "genie_space"
          genie_space:
            name: "Xome Real Estate Analytics"
            space_id: "01f1484fd22e1d558c5ed706de7b522d"
            permission: "CAN_RUN"

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    workspace:
      host: https://fevm-serverless-stable-14ey07.cloud.databricks.com
      profile: fevm
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    resources:
      apps:
        xome_lakebase_campaign_genie:
          name: xome-lakebase-campaign-genie
